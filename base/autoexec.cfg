// Visualizer boot config. Auto-exec'd at startup (after default.cfg).
// Snap the console fully open so text is static and crisp (no slide-ghosting).
seta con_speed "100"
seta com_showFPS "0"
seta r_swapInterval "1"
// Suppress on-screen console "notify" lines so they don't ghost over the
// visualizer (console still opens with ~; output still goes to the log).
seta con_noPrint "1"
seta con_notifyTime "0"
// Default the analyzer to system loopback so vis_status reacts immediately.
seta s_useCompression "0"
