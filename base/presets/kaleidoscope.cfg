// starter visualizer preset
seta vis_effect 1
seta vis_bands 9
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.94
seta vis_feedbackZoom 1.02
seta vis_warp 3
seta vis_warpMode 1
seta vis_warpAmount 0.25
seta vis_warpFreq 10.0
seta vis_warpSpeed 3.0
seta vis_mod 1
seta vis_lfoPeriod 16.0
vis_route scale mid 0.50 0.60
vis_route hue lfo 1.0 0.0
vis_route bright beat 0.20 0.75
vis_route zoom bassatt 0.03 0.0
vis_route rotate mid 1.80 0.40
