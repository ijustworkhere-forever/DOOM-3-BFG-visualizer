// starter visualizer preset
seta vis_effect 2
seta vis_bands 7
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.97
seta vis_feedbackZoom 1.01
seta vis_warp 3
seta vis_warpMode 3
seta vis_warpAmount 0.12
seta vis_warpFreq 4.0
seta vis_warpSpeed 0.6
seta vis_mod 1
seta vis_lfoPeriod 40.0
vis_route scale rms 0.60 0.50
vis_route hue lfo 1.0 0.0
vis_route bright rms 0.20 0.70
vis_route zoom bass 0.02 0.0
vis_route rotate lfo 0.10 0.02
