// starter visualizer preset
seta vis_effect 2
seta vis_bands 7
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.96
seta vis_feedbackZoom 1.008
seta vis_mod 1
seta vis_lfoPeriod 20.0
vis_route scale rms 1.20 0.40
vis_route hue lfo 1.0 0.0
vis_route bright beat 0.10 0.90
vis_route zoom bassatt 0.02 0.0
vis_route rotate treb 0.30 0.05
