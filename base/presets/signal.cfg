// starter visualizer preset
seta vis_effect 3
seta vis_bands 7
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.90
seta vis_feedbackZoom 1.005
seta vis_mod 1
seta vis_lfoPeriod 10.0
vis_route scale trebatt 0.50 0.70
vis_route hue treb 0.40 0.10
vis_route bright beat 0.30 0.65
vis_route zoom beat 0.02 0.0
vis_route rotate treb 0.80 0.15
