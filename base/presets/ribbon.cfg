// starter visualizer preset
seta vis_effect 3
seta vis_bands 9
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.92
seta vis_feedbackZoom 1.008
seta vis_warp 1
seta vis_warpMode 0
seta vis_warpAmount 0.10
seta vis_warpFreq 6.0
seta vis_warpSpeed 1.2
seta vis_mod 1
seta vis_lfoPeriod 24.0
vis_route scale mid 0.70 0.55
vis_route hue lfo 1.0 0.0
vis_route bright rms 0.25 0.65
vis_route zoom mid 0.03 0.0
vis_route rotate lfo 0.30 0.05
