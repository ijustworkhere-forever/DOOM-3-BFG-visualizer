// starter visualizer preset
seta vis_effect 1
seta vis_bands 9
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.95
seta vis_feedbackZoom 1.05
seta vis_warp 2
seta vis_warpMode 2
seta vis_warpAmount 0.20
seta vis_warpFreq 8.0
seta vis_warpSpeed 2.5
seta vis_mod 1
seta vis_lfoPeriod 14.0
vis_route scale bass 0.40 0.60
vis_route hue mid 0.50 0.10
vis_route bright beat 0.15 0.80
vis_route zoom bass 0.06 0.0
vis_route rotate bass 2.00 0.50
