// starter visualizer preset
seta vis_effect 1
seta vis_bands 9
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.93
seta vis_feedbackZoom 1.03
seta vis_warp 1
seta vis_warpAmount 0.08
seta vis_warpFreq 7.0
seta vis_warpSpeed 1.5
seta vis_mod 1
seta vis_lfoPeriod 12.0
vis_route scale bassatt 0.35 0.95
vis_route hue lfo 1.0 0.0
vis_route bright beat 0.15 0.85
vis_route zoom bass 0.05 0.0
vis_route rotate mid 1.20 0.20
