// starter visualizer preset
seta vis_effect 4
seta vis_bands 7
seta vis_fullscreen 1
seta vis_feedback 1
seta vis_feedbackDecay 0.95
seta vis_feedbackZoom 1.005
seta vis_mod 1
seta vis_lfoPeriod 60.0
vis_route scale bass 0.50 0.40
vis_route hue lfo 1.0 0.0
vis_route bright rms 0.20 0.70
vis_route zoom bass 0.02 0.0
vis_route rotate lfo 0.08 0.01
